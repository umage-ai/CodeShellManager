<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
  #terminal { width: 100%; height: 100%; }

  /* Drag-over overlay */
  #dropOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(137, 180, 250, 0.15);
    border: 2px dashed #89b4fa;
    z-index: 100;
    pointer-events: none;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    font-size: 16px;
    color: #89b4fa;
  }
  #dropOverlay.active { display: flex; }

  body.retro::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px
      );
    mix-blend-mode: multiply;
    z-index: 50;
  }

  /* Boot overlay — visible until terminal-init.js receives bootDone */
  #bootOverlay {
    position: fixed; inset: 0;
    background: #1e1e2e;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-family: 'Segoe UI', sans-serif;
    color: #cdd6f4;
    transition: opacity 200ms ease-out;
  }
  #bootOverlay.hidden { opacity: 0; pointer-events: none; }
  #bootSpinner {
    width: 44px; height: 44px;
    --boot-accent: #89b4fa;
  }
  #bootSpinner circle {
    fill: none;
    stroke: var(--boot-accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 90 150;
    transform-origin: center;
    animation: bootSpin 1.2s linear infinite;
  }
  @keyframes bootSpin { to { transform: rotate(360deg); } }
  #bootLabel { font-size: 13px; opacity: 0.85; }
</style>
<link rel="stylesheet" href="xterm.css" />
</head>
<body>
<div id="terminal"></div>
<div id="bootOverlay">
  <svg id="bootSpinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20"/></svg>
  <div id="bootLabel">Initializing terminal…</div>
</div>
<div id="dropOverlay">Drop files to insert path(s)</div>

<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script src="terminal-init.js"></script>
</body>
</html>
